// Convert numbers to Hindi words for TTS
function numToHindi(n) {
  const map = {
    0: "zero", 1: "ek", 2: "do", 3: "teen", 4: "chaar", 5: "paanch",
    6: "chheh", 7: "saat", 8: "aath", 9: "nau", 10: "das",
    11: "gyarah", 12: "baarah", 13: "terah", 14: "chaudah", 15: "pandrah",
    16: "solah", 17: "satrah", 18: "athaarah", 19: "unees", 20: "bees",
    25: "pacchees", 30: "tees", 40: "chaalis", 50: "pachaas",
    60: "saath", 70: "sattar", 80: "assi", 90: "nabbe", 100: "sau",
    150: "dedh sau", 200: "do sau", 250: "dhaai sau", 300: "teen sau",
    400: "chaar sau", 500: "paanch sau",
  };
  if (map[n]) return map[n];
  if (n > 100 && n < 200) return "ek sau " + (map[n - 100] || (n - 100));
  if (n > 200 && n < 300) return "do sau " + (map[n - 200] || (n - 200));
  if (n > 300 && n < 400) return "teen sau " + (map[n - 300] || (n - 300));
  if (n > 400 && n < 500) return "chaar sau " + (map[n - 400] || (n - 400));
  return String(n);
}

function hindiItems(items) {
  var text = items;
  // First convert quantities with grams to Hindi
  text = text.replace(/(\d+)g/g, function(_, n) { return numToHindi(parseInt(n)) + " gram"; });
  text = text.replace(/(\d+)\s*tsp/g, function(_, n) { return numToHindi(parseInt(n)) + " chhota chamach"; });
  text = text.replace(/(\d+)\s*tbsp/g, function(_, n) { return numToHindi(parseInt(n)) + " bada chamach"; });
  text = text.replace(/(\d+)\s*scoop/g, function(_, n) { return numToHindi(parseInt(n)) + " scoop"; });
  text = text.replace(/(\d+)\s*piece/g, function(_, n) { return numToHindi(parseInt(n)) + " piece"; });
  text = text.replace(/(\d+)\s*slice/g, function(_, n) { return numToHindi(parseInt(n)) + " slice"; });

  // Sort by length (longest first) to avoid partial replacements
  var sortedEntries = Object.entries(hindiWords).sort(function(a, b) { return b[0].length - a[0].length; });
  for (var i = 0; i < sortedEntries.length; i++) {
    var eng = sortedEntries[i][0];
    var hin = sortedEntries[i][1];
    if (eng !== hin) {
      var regex = new RegExp(eng.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), "gi");
      text = text.replace(regex, hin);
    }
  }

  // Remove (dry) and other parenthetical notes
  text = text.replace(/\s*\(dry\)/g, "");
  text = text.replace(/\s*\(cooked\)/g, "");
  return text;
}

// Convert the generated script's remaining numbers to Hindi
function hindiScript(text) {
  text = text.replace(/Total (\d+)/g, function(_, n) { return "Total " + numToHindi(parseInt(n)); });
  text = text.replace(/(\d+) ande/g, function(_, n) { return numToHindi(parseInt(n)) + " ande"; });
  text = text.replace(/(\d+) mere/g, function(_, n) { return numToHindi(parseInt(n)) + " mere"; });
  text = text.replace(/(\d+) bhaiya/g, function(_, n) { return numToHindi(parseInt(n)) + " bhaiya"; });
  text = text.replace(/(\d+) roti/g, function(_, n) { return numToHindi(parseInt(n)) + " roti"; });
  text = text.replace(/(\d+) paratha/g, function(_, n) { return numToHindi(parseInt(n)) + " paratha"; });
  text = text.replace(/(\d+) mini/g, function(_, n) { return numToHindi(parseInt(n)) + " mini"; });
  text = text.replace(/(\d+) chhoti/g, function(_, n) { return numToHindi(parseInt(n)) + " chhoti"; });
  text = text.replace(/(\d+)g/g, function(_, n) { return numToHindi(parseInt(n)) + " gram"; });
  return text;
}

// Smart combiner - extracts quantities and combines them
// Simple quantity extractor — only extracts "Xg word" at the start of comma-separated items
function extractGrams(text, keyword) {
  var re = new RegExp("(\\d+)g\\s+" + keyword, "i");
  var m = text.match(re);
  return m ? parseInt(m[1]) : 0;
}

function countItem(text, keyword) {
  var re = new RegExp("(\\d+)\\s+" + keyword, "i");
  var m = text.match(re);
  return m ? parseInt(m[1]) : 0;
}

function generateMorningScript(day, prerna, mohit, config) {

  var mohitActive = config.mohitActive;

    var pB = prerna.breakfast.items;

    var pEggs = countItem(pB, "egg");
    var mEggs = countItem(mB, "egg");

    if (pEggs + mEggs > 0) {
      var style = pB.indexOf("omelette") >= 0 ? "omelette style" : pB.indexOf("bhurji") >= 0 ? "bhurji style" : "half fried";
      lines.push("Total " + numToHindi(pEggs + mEggs) + " ande banana hai, " + style + ".");
      lines.push(numToHindi(pEggs) + " mere liye pack karna, " + numToHindi(mEggs) + " bhaiya ke liye ghar pe rakhna.");
    }
    if (pB.indexOf("bread") >= 0) lines.push("Dono ke liye ek ek bread bhi dena.");
    lines.push("");

    // --- LUNCH ---
    lines.push("Dopahar ka khana:");
    var pL = prerna.lunch.items;
    var mL = mohit.lunch.items;

    // Combine chicken
    var pChick = extractGrams(pL, "chicken");
    var mChick = extractGrams(mL, "chicken");
    if (pChick + mChick > 0) {
      var totalChick = pChick + mChick;
      var chickStyle = pL.indexOf("tikka") >= 0 ? "tikka banana hai" : "banana hai, kam tel mein";
      lines.push(numToHindi(totalChick) + " gram chicken " + chickStyle + ".");
    }

    // Combine chhole
    var pChhole = extractGrams(pL, "chhole") || extractGrams(pL, "boiled chhole");
    var mChhole = extractGrams(mL, "chhole") || extractGrams(mL, "boiled chhole");
    if (pChhole + mChhole > 0) {
      lines.push(numToHindi(pChhole + mChhole) + " gram chhole boil karke, thoda masala daal ke pan mein saute karna hai.");

    // Combine dal
    var pDal = extractGrams(pL, "dal") || extractGrams(pL, "moong dal");
    var mDal = extractGrams(mL, "dal") || extractGrams(mL, "moong dal");
    if (pDal + mDal > 0) {
      lines.push(numToHindi(pDal + mDal) + " gram dal ka tadka banana hai.");
    }

    // Combine rajma
    var pRajma = extractGrams(pL, "rajma");
    var mRajma = extractGrams(mL, "rajma");
    if (pRajma + mRajma > 0) {
      lines.push(numToHindi(pRajma + mRajma) + " gram rajma ki curry banana hai.");
    }

    // Combine veggies/sabzi
    var pVeg = extractGrams(pL, "veggies") || extractGrams(pL, "sabzi") || extractGrams(pL, "mixed");
    var mVeg = extractGrams(mL, "veggies") || extractGrams(mL, "sabzi") || extractGrams(mL, "mixed");
    if (pVeg + mVeg > 0) {
      lines.push(numToHindi(pVeg + mVeg) + " gram sabzi bhi banana hai.");
    }

    // Carbs — keep separate (rice for Prerna, roti for Mohit typically)
    var pRice = extractGrams(pL, "rice") || extractGrams(pL, "palak rice");
    var mRice = extractGrams(mL, "rice") || extractGrams(mL, "palak rice");
    var pRoti = countItem(pL, "roti") || countItem(pL, "paratha");
    var mRoti = countItem(mL, "roti") || countItem(mL, "paratha");
    var pRiceType = pL.indexOf("palak rice") >= 0 ? "palak chawal" : "chawal";
    var mRiceType = mL.indexOf("palak rice") >= 0 ? "palak chawal" : "chawal";

function generateEveningScript(day, prerna, mohit, config) {
  var prernaActive = config.prernaActive;
  var mohitActive = config.mohitActive;
  if (day === "Friday") return "Noor, aaj dinner bahar se hoga. Kuch banana nahi hai.";

  var lines = ["Noor, aaj ka dinner:"];

  if (prernaActive && mohitActive) {
    var pD = prerna.dinner.items;
    var mD = mohit.dinner.items;

    // Combine proteins
    var pChick = extractGrams(pD, "chicken");
    var mChick = extractGrams(mD, "chicken");
    if (pChick + mChick > 0) {
      lines.push(numToHindi(pChick + mChick) + " gram chicken ki curry banani hai, kam tel mein.");
    }

    var pFish = extractGrams(pD, "fish");
    var mFish = extractGrams(mD, "fish");
    if (pFish + mFish > 0) {
      lines.push(numToHindi(pFish + mFish) + " gram machhi ki curry banani hai, kam tel mein.");
    }

    var pPrawn = extractGrams(pD, "prawn") || extractGrams(pD, "prawns");
    var mPrawn = extractGrams(mD, "prawn") || extractGrams(mD, "prawns");
    if (pPrawn + mPrawn > 0) {
      lines.push(numToHindi(pPrawn + mPrawn) + " gram jhinga ki curry banani hai, halki gravy mein.");
    }

    var pPaneer = extractGrams(pD, "paneer");
    var mPaneer = extractGrams(mD, "paneer");
    if (pPaneer + mPaneer > 0) {
      lines.push(numToHindi(pPaneer + mPaneer) + " gram paneer tikka air fry karna hai.");
    }

    // Combine veggies
    var pVeg = extractGrams(pD, "veggies") || extractGrams(pD, "airfried veggies");
    var mVeg = extractGrams(mD, "veggies") || extractGrams(mD, "airfried veggies");
    if (pVeg + mVeg > 0) {
      lines.push(numToHindi(pVeg + mVeg) + " gram sabzi air fry karna hai.");
    }

    // Rajma kebab
    if (pD.indexOf("rajma kebab") >= 0 || mD.indexOf("rajma kebab") >= 0) {
      lines.push("Rajma ke kebab banana hai dono ke liye.");
    }

    // Bharta
    if (pD.indexOf("bharta") >= 0 || mD.indexOf("bharta") >= 0) {
      lines.push("Baingan bharta bhi banana hai.");
    }

    // Carbs — separate for each person
    var pRice = extractGrams(pD, "rice");
    var mRice = extractGrams(mD, "rice");
    var pRoti = countItem(pD, "roti") || countItem(pD, "paratha");
    var mRoti = countItem(mD, "roti") || countItem(mD, "paratha");
    var pType = pD.indexOf("palak roti") >= 0 ? "palak roti" : pD.indexOf("paratha") >= 0 ? "paratha" : pD.indexOf("stuffed roti") >= 0 ? "stuffed roti" : "roti";
    var mType = mD.indexOf("palak roti") >= 0 ? "palak roti" : mD.indexOf("paratha") >= 0 ? "paratha" : mD.indexOf("stuffed roti") >= 0 ? "stuffed roti" : "roti";

    var carbLines = [];
    if (pRice > 0) carbLines.push(numToHindi(pRice) + " gram chawal mere liye");
    if (pRoti > 0 && pRice === 0) carbLines.push(numToHindi(pRoti) + " " + pType + " mere liye");
    if (mRice > 0) carbLines.push(numToHindi(mRice) + " gram chawal bhaiya ke liye");
    if (mRoti > 0 && mRice === 0) carbLines.push(numToHindi(mRoti) + " " + mType + " bhaiya ke liye");
    if (carbLines.length > 0) lines.push(carbLines.join(", ") + ".");

    // If nothing matched (completely different meals)
    if (pChick + mChick + pFish + mFish + pPrawn + mPrawn + pPaneer + mPaneer === 0 && pD.indexOf("rajma") < 0) {
      lines = ["Noor, aaj ka dinner:"];
      lines.push("Mere liye: " + hindiItems(pD));
      lines.push("Bhaiya ke liye: " + hindiItems(mD));
    }

  } else if (prernaActive) {
    lines.push("Aaj sirf mera dinner banana hai:");
    lines.push(hindiItems(prerna.dinner.items));
  } else if (mohitActive) {
    lines.push("Aaj sirf bhaiya ka dinner banana hai:");
    lines.push(hindiItems(mohit.dinner.items));
  }
  return hindiScript(lines.join("\n"));
}

function estimateNutrition(itemsText) {
  const text = itemsText.toLowerCase();
  let totalCal = 0;
  let totalProtein = 0;
  let matched = [];

  // Try to extract quantities like "150g chicken", "2 eggs", "30g rice", "1 scoop whey"
  for (const [name, data] of Object.entries(nutritionDB)) {
    const allNames = [name, ...data.aliases];
    for (const n of allNames) {
      if (!text.includes(n.toLowerCase())) continue;

      // Try to find quantity before this item
      const patterns = [
        new RegExp("(\\d+)\\s*g\\s*" + n.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), "i"),
        new RegExp("(\\d+)\\s*" + n.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), "i"),
        new RegExp(n.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + "\\s*x?\\s*(\\d+)", "i"),
      ];

      let qty = 1;
      let isGrams = false;
      for (const pat of patterns) {
        const m = text.match(pat);
        if (m) {
          qty = parseInt(m[1]);
          isGrams = pat.source.includes("g\\\\s");
          break;
        }
      }

      let cal, prot;
      if (data.unit.includes("100g") && qty > 10) {
        // qty is in grams, scale to per-100g
        cal = Math.round(data.cal * qty / 100);
        prot = Math.round(data.protein * qty / 100);
      } else if (data.unit === "piece" || data.unit === "scoop" || data.unit === "slice" || data.unit === "tsp" || data.unit === "tbsp" || data.unit === "serving") {
        cal = data.cal * qty;
        prot = data.protein * qty;
      } else {
        cal = data.cal;
        prot = data.protein;
      }

      if (!matched.includes(name)) {
        totalCal += cal;
        totalProtein += prot;
        matched.push(name);
      }
      break; // only match first alias
    }
  }

  // Add base cooking oil if not explicitly mentioned and this looks like a cooked dish
  if (!matched.includes("oil") && !matched.includes("ghee") && matched.length > 0) {
    const cookedDish = text.includes("curry") || text.includes("sabzi") || text.includes("fry") || text.includes("masala");
    if (cookedDish) {
      totalCal += 90; // ~2 tsp oil
    }
  }

  return { cal: totalCal, protein: totalProtein, matched: matched };
}

function VoiceNotePanel({ title, time, script, status, onSend, onCancel, day, elevenLabsConfig }) {
  const isCancelled = status === "cancelled";
  const isSent = status === "sent";
  const [scriptExpanded, setScriptExpanded] = useState(false);
  const [audioMode, setAudioMode] = useState("ai"); // "ai" | "record"
  const [isGenerating, setIsGenerating] = useState(false);
  const [audioUrl, setAudioUrl] = useState(null);
  const [audioBlob, setAudioBlob] = useState(null);
  const [isPlaying, setIsPlaying] = useState(false);
  const [isRecording, setIsRecording] = useState(false);
  const [recordingTime, setRecordingTime] = useState(0);
  const [mediaRecorder, setMediaRecorder] = useState(null);
  const [error, setError] = useState(null);
  const audioRef = useRef(null);
  const timerRef = useRef(null);

  // Generate audio with ElevenLabs
  const handleGenerate = async () => {
    if (!(elevenLabsConfig && elevenLabsConfig.apiKey) || !(elevenLabsConfig && elevenLabsConfig.voiceId)) {
      setError("Please set your ElevenLabs API key and Voice ID in Settings ⚙️");
      return;
    }

    setIsGenerating(true);
    setError(null);

    try {
      const response = await fetch(
        `https://api.elevenlabs.io/v1/text-to-speech/${elevenLabsConfig.voiceId}`,
        {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "xi-api-key": elevenLabsConfig.apiKey,
          },
          body: JSON.stringify({
            text: script,
            model_id: "eleven_v3",
            voice_settings: {
              stability: 0.75,
              similarity_boost: 0.8,
            },
          }),
        }
      );

      if (!response.ok) {
        const errData = await response.json().catch(() => ({}));
        throw new Error((errData && errData.detail && errData.detail.message) || `API error: ${response.status}`);
      }

      const blob = await response.blob();
      const url = URL.createObjectURL(blob);
      setAudioUrl(url);
      setAudioBlob(blob);
      setAudioMode("ai");
    } catch (err) {
      setError(err.message || "Failed to generate audio. Check your API key and Voice ID.");
    } finally {
      setIsGenerating(false);
    }
  };

  // Play/pause audio
  const handlePlayPause = () => {
    if (!audioRef.current) return;
    if (isPlaying) {
      audioRef.current.pause();
      setIsPlaying(false);
    } else {
      audioRef.current.play();
      setIsPlaying(true);
    }
  };

  // Record own voice
  const handleStartRecording = async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const recorder = new MediaRecorder(stream);
      const chunks = [];

      recorder.ondataavailable = (e) => chunks.push(e.data);
      recorder.onstop = () => {
        const blob = new Blob(chunks, { type: "audio/webm" });
        const url = URL.createObjectURL(blob);
        setAudioUrl(url);
        setAudioBlob(blob);
        setAudioMode("record");
        stream.getTracks().forEach(t => t.stop());
      };

      recorder.start();
      setMediaRecorder(recorder);
      setIsRecording(true);
      setRecordingTime(0);
      timerRef.current = setInterval(() => setRecordingTime(t => t + 1), 1000);
    } catch (err) {
      setError("Microphone access denied. Please allow mic access.");
    }
  };

  const handleStopRecording = () => {
    if (mediaRecorder && mediaRecorder.state === "recording") {
      mediaRecorder.stop();
      setIsRecording(false);
      clearInterval(timerRef.current);
    }
  };

  const handleClearAudio = () => {
    if (audioUrl) URL.revokeObjectURL(audioUrl);
    setAudioUrl(null);
    setAudioBlob(null);
    setIsPlaying(false);
  };

  const formatTime = (s) => `${Math.floor(s / 60)}:${(s % 60).toString().padStart(2, "0")}`;

  return (
    <div style={{
      background: isCancelled ? "#fdf5f5" : isSent ? "#f0faf0" : theme.card,
      borderRadius: 16,
      padding: "18px 20px",
      border: `1px solid ${isCancelled ? "#f0d0d0" : isSent ? "#c0e8c0" : theme.border}`,
      marginBottom: 14,
    }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <MicIcon />
          <div>
            <div style={{ fontSize: 14, fontWeight: 700, color: theme.text, fontFamily: "'Outfit', sans-serif" }}>{title}</div>
            <div style={{ fontSize: 11, color: theme.textMuted }}>Scheduled: {time}</div>
          </div>
        </div>
        <div style={{
          fontSize: 11, fontWeight: 700, padding: "4px 10px", borderRadius: 20,
          background: isCancelled ? "#fce4e4" : isSent ? "#d4f5d4" : theme.accentLight,
          color: isCancelled ? theme.red : isSent ? "#2a8a2a" : theme.accent,
        }}>
          {isCancelled ? "Cancelled" : isSent ? "Sent ✓" : "Pending"}
        </div>
      </div>

      {/* Script text — collapsible */}
      <button onClick={() => setScriptExpanded(!scriptExpanded)} style={{
        width: "100%", background: "#f6f5f3", borderRadius: 10, padding: "10px 14px",
        border: "none", cursor: "pointer", marginBottom: 12,
        display: "flex", justifyContent: "space-between", alignItems: "center",
        opacity: isCancelled ? 0.5 : 1,
      }}>
        <span style={{ fontSize: 12, color: theme.textMuted, fontFamily: "'Outfit', sans-serif" }}>
          {scriptExpanded ? "Hide message" : "View message"}
        </span>
        <span style={{ fontSize: 14, color: theme.textMuted, transform: scriptExpanded ? "rotate(180deg)" : "rotate(0)", transition: "transform 0.2s" }}>▼</span>
      </button>
      {scriptExpanded && (
        <div style={{
          background: "#f6f5f3", borderRadius: 10, padding: "12px 14px",
          fontSize: 13, lineHeight: 1.7, color: theme.text, whiteSpace: "pre-wrap",
          fontFamily: "'Outfit', sans-serif", marginBottom: 12, marginTop: -8,
          borderLeft: `3px solid ${theme.accent}`, opacity: isCancelled ? 0.5 : 1,
        }}>
          {script}
        </div>
      )}

      {/* Audio Section */}
      {!isCancelled && !isSent && (
        <>
          {/* Error */}
          {error && (
            <div style={{
              background: "#fef2f2", border: "1px solid #fecaca", borderRadius: 10,
              padding: "8px 12px", marginBottom: 10, fontSize: 12, color: "#dc2626",
            }}>
              {error}
            </div>
          )}

          {/* No audio yet — show generate + record buttons */}
          {!audioUrl && !isRecording && (
            <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
              <button onClick={handleGenerate} disabled={isGenerating} style={{
                flex: 1, padding: "12px 0", border: "none", borderRadius: 12, cursor: "pointer",
                background: isGenerating ? "#eee" : theme.text,
                color: "#fff", fontSize: 13, fontWeight: 700, fontFamily: "'Outfit', sans-serif",
                display: "flex", alignItems: "center", justifyContent: "center", gap: 6,
                opacity: isGenerating ? 0.7 : 1,
              }}>
                {isGenerating ? (
                  <>
                    <span style={{ animation: "spin 1s linear infinite", display: "inline-block" }}>⏳</span>
                    Generating...
                  </>
                ) : (
                  <>🎙️ Generate with My Voice</>
                )}
              </button>
              <button onClick={handleStartRecording} style={{
                padding: "12px 16px", border: `1.5px solid ${theme.border}`, borderRadius: 12,
                cursor: "pointer", background: theme.card, color: theme.text,
                fontSize: 13, fontWeight: 600, fontFamily: "'Outfit', sans-serif",
                display: "flex", alignItems: "center", gap: 4,
              }}>
                🔴 Record
              </button>
            </div>
          )}

          {/* Recording in progress */}
          {isRecording && (
            <div style={{
              background: "linear-gradient(135deg, #ff4757, #ff6b81)", borderRadius: 12,
              padding: "14px 16px", marginBottom: 12, display: "flex", alignItems: "center", gap: 12,
            }}>
              <div style={{
                width: 12, height: 12, borderRadius: "50%", background: "#fff",
                animation: "pulse 1s ease-in-out infinite",
              }} />
              <div style={{ flex: 1, color: "#fff" }}>
                <div style={{ fontSize: 13, fontWeight: 700, fontFamily: "'Outfit', sans-serif" }}>
                  Recording... {formatTime(recordingTime)}
                </div>
                <div style={{ fontSize: 10, opacity: 0.9, marginTop: 2 }}>Read the script above</div>
              </div>
              <button onClick={handleStopRecording} style={{
                padding: "8px 16px", border: "none", borderRadius: 8,
                background: "rgba(255,255,255,0.3)", color: "#fff",
                fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "'Outfit', sans-serif",
              }}>
                ⏹ Stop
              </button>
            </div>
          )}

          {/* Audio ready — player */}
          {audioUrl && !isRecording && (
            <div style={{
              background: isPlaying ? theme.text : "#f4f4f2",
              borderRadius: 12, padding: "12px 14px", marginBottom: 12,
              display: "flex", alignItems: "center", gap: 10, transition: "all 0.3s",
            }}>
              <audio
                ref={(el) => {
                  audioRef.current = el;
                  if (el) el.onended = () => setIsPlaying(false);
                }}
                src={audioUrl}
              />
              <button onClick={handlePlayPause} style={{
                width: 40, height: 40, borderRadius: "50%", border: "none", cursor: "pointer",
                background: isPlaying ? "rgba(255,255,255,0.25)" : theme.accent,
                color: "#fff", display: "flex", alignItems: "center", justifyContent: "center",
                fontSize: 18, flexShrink: 0,
              }}>
                {isPlaying ? "⏸" : "▶"}
              </button>
              <div style={{ flex: 1 }}>
                <div style={{
                  fontSize: 12, fontWeight: 600, fontFamily: "'Outfit', sans-serif",
                  color: isPlaying ? "#fff" : theme.text,
                }}>
                  {audioMode === "ai" ? "🎙️ AI Voice (ElevenLabs)" : "🎤 Your Recording"}
                </div>
                {isPlaying && (
                  <div style={{ display: "flex", gap: 2, marginTop: 6 }}>
                    {[...Array(24)].map((_, i) => (
                      <div key={i} style={{
                        width: 3, borderRadius: 2,
                        height: 4 + Math.random() * 14,
                        background: "rgba(255,255,255,0.6)",
                        animation: `waveBar 0.5s ease-in-out ${i * 0.05}s infinite alternate`,
                      }} />
                    ))}
                  </div>
                )}
                {!isPlaying && (
                  <div style={{ fontSize: 10, color: isPlaying ? "rgba(255,255,255,0.7)" : theme.textMuted, marginTop: 2 }}>
                    Ready to send to Noor
                  </div>
                )}
              </div>
              <button onClick={handleClearAudio} style={{
                background: "none", border: "none", cursor: "pointer", padding: 4,
                color: isPlaying ? "rgba(255,255,255,0.6)" : theme.textMuted, fontSize: 14,
              }} title="Remove & re-do">
                ✕
              </button>
            </div>
          )}

          {/* Action buttons */}
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={() => {
              const phone = (elevenLabsConfig && elevenLabsConfig.noorPhone) || "";
              if (audioBlob) {
                // Download the audio file
                const a = document.createElement("a");
                a.href = audioUrl;
                a.download = `noor-${day}-${title.includes("Morning") ? "morning" : "dinner"}.mp3`;
                a.click();
                // Open WhatsApp to Noor (no text — user attaches the audio)
                setTimeout(() => {
                  const waUrl = phone ? `https://wa.me/${phone}` : `https://wa.me/`;
                  window.open(waUrl, "_blank");
                  onSend();
                }, 500);
              }
            }} style={{
              flex: 1, display: "flex", alignItems: "center", justifyContent: "center", gap: 6,
              background: audioUrl ? theme.green : "#a0d8a0",
              color: "#fff", border: "none", borderRadius: 10, padding: "10px 0",
              fontSize: 13, fontWeight: 600, cursor: audioUrl ? "pointer" : "default",
              fontFamily: "'Outfit', sans-serif", opacity: audioUrl ? 1 : 0.6,
            }}>
              <WhatsAppIcon /> {audioUrl ? "Send to Noor" : "Generate audio first"}
            </button>
            <button onClick={onCancel} style={{
              display: "flex", alignItems: "center", justifyContent: "center", gap: 4,
              background: "#fce4e4", color: theme.red, border: "none", borderRadius: 10,
              padding: "10px 16px", fontSize: 13, fontWeight: 600, cursor: "pointer",
              fontFamily: "'Outfit', sans-serif",
            }}>
              <XIcon /> Cancel
            </button>
          </div>
        </>
      )}
    </div>
  );
}

// ─── Surprise Voice Card — generate voice + send recipe link ────────────────
function SurpriseVoiceCard({ selection, onDismiss, elevenLabsConfig, showToast }) {
  const [isGenerating, setIsGenerating] = useState(false);
  const [audioUrl, setAudioUrl] = useState(null);
  const [audioBlob, setAudioBlob] = useState(null);
  const [isPlaying, setIsPlaying] = useState(false);
  const [error, setError] = useState(null);
  const audioRef = useRef(null);

  const script = `Noor, aaj dinner mein ${selection.name} banana hai.`;

  const handleGenerate = async () => {
    const apiKey = elevenLabsConfig && elevenLabsConfig.apiKey;
    const voiceId = elevenLabsConfig && elevenLabsConfig.voiceId;
    if (!apiKey || !voiceId) {
      setError("Please set ElevenLabs API key and Voice ID in Settings");
      return;
    }
    setIsGenerating(true);
    setError(null);
    try {
      const response = await fetch(
        `https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`,
        {
          method: "POST",
          headers: { "Content-Type": "application/json", "xi-api-key": apiKey },
          body: JSON.stringify({
            text: script,
            model_id: "eleven_v3",
            voice_settings: { stability: 0.75, similarity_boost: 0.8 },
          }),
        }
      );
      if (!response.ok) {
        const errData = await response.json().catch(function() { return {}; });
        throw new Error((errData && errData.detail && errData.detail.message) || "API error: " + response.status);
      }
      const blob = await response.blob();
      const url = URL.createObjectURL(blob);
      setAudioUrl(url);
      setAudioBlob(blob);
    } catch (err) {
      setError(err.message || "Failed to generate audio");
    } finally {
      setIsGenerating(false);
    }
  };

  const handlePlayPause = () => {
    if (!audioRef.current) return;
    if (isPlaying) { audioRef.current.pause(); setIsPlaying(false); }
    else { audioRef.current.play(); setIsPlaying(true); }
  };

  const handleSendToNoor = () => {
    const phone = (elevenLabsConfig && elevenLabsConfig.noorPhone) || "";
    if (audioBlob) {
      // Download audio
      const a = document.createElement("a");
      a.href = audioUrl;
      a.download = "noor-surprise-" + selection.name.replace(/\s+/g, "-").toLowerCase() + ".mp3";
      a.click();
    }
    // Send YouTube link via WhatsApp
    const ytLink = selection.youtube || "";
    const waText = ytLink ? "Recipe: " + ytLink : "";
    const waUrl = phone
      ? "https://wa.me/" + phone + (waText ? "?text=" + encodeURIComponent(waText) : "")
      : "https://wa.me/" + (waText ? "?text=" + encodeURIComponent(waText) : "");
    setTimeout(function() { window.open(waUrl, "_blank"); }, audioBlob ? 500 : 0);
    showToast("Voice note downloaded + recipe link sent!");
  };

  return (
    <div style={{
      background: theme.card, borderRadius: 12, padding: "14px 16px", marginTop: 10,
      border: "1.5px solid " + theme.accent,
    }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
        <div>
          <div style={{ fontSize: 10, fontWeight: 700, color: theme.accent, textTransform: "uppercase", letterSpacing: "0.05em" }}>
            Surprise Pick
          </div>
          <div style={{ fontSize: 15, fontWeight: 700, color: theme.text, marginTop: 4, fontFamily: "'Outfit', sans-serif" }}>
            {selection.name}
          </div>
          <div style={{ fontSize: 11, color: theme.textMuted, marginTop: 2 }}>
            "{script}"
          </div>
        </div>
        <button onClick={onDismiss} style={{
          background: "none", border: "none", cursor: "pointer", color: theme.textMuted, fontSize: 16,
        }}>✕</button>
      </div>

      {error && (
        <div style={{
          background: "#fef2f2", border: "1px solid #fecaca", borderRadius: 8,
          padding: "6px 10px", marginTop: 8, fontSize: 11, color: "#dc2626",
        }}>{error}</div>
      )}

      {/* Generate / Player */}
      {!audioUrl ? (
        <button onClick={handleGenerate} disabled={isGenerating} style={{
          width: "100%", padding: "10px 0", border: "none", borderRadius: 8, marginTop: 10,
          background: isGenerating ? "#eee" : theme.text, color: isGenerating ? theme.textMuted : "#fff",
          fontSize: 12, fontWeight: 600, cursor: isGenerating ? "wait" : "pointer",
          fontFamily: "'Outfit', sans-serif", display: "flex", alignItems: "center", justifyContent: "center", gap: 6,
        }}>
          {isGenerating ? "Generating..." : "🎙️ Generate Voice Note"}
        </button>
      ) : (
        <div style={{
          background: isPlaying ? theme.text : "#f4f4f2", borderRadius: 10, padding: "10px 12px",
          marginTop: 10, display: "flex", alignItems: "center", gap: 8,
        }}>
          <audio ref={function(el) { audioRef.current = el; if (el) el.onended = function() { setIsPlaying(false); }; }} src={audioUrl} />
          <button onClick={handlePlayPause} style={{
            width: 34, height: 34, borderRadius: "50%", border: "none", cursor: "pointer",
            background: isPlaying ? "rgba(255,255,255,0.2)" : theme.accent, color: "#fff",
            display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16, flexShrink: 0,
          }}>{isPlaying ? "⏸" : "▶"}</button>
          <div style={{ flex: 1, fontSize: 12, fontWeight: 600, color: isPlaying ? "#fff" : theme.text, fontFamily: "'Outfit', sans-serif" }}>
            {isPlaying ? "Playing..." : "Ready to send"}
          </div>
          <button onClick={function() { if (audioUrl) URL.revokeObjectURL(audioUrl); setAudioUrl(null); setAudioBlob(null); }} style={{
            background: "none", border: "none", cursor: "pointer", color: isPlaying ? "rgba(255,255,255,0.5)" : theme.textMuted, fontSize: 12,
          }}>✕</button>
        </div>
      )}

      {/* Send buttons */}
      <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
        <button onClick={handleSendToNoor} style={{
          flex: 1, padding: "10px 0", border: "none", borderRadius: 8,
          background: audioUrl ? theme.green : "#ccc", color: "#fff", fontSize: 12, fontWeight: 600,
          cursor: audioUrl ? "pointer" : "default", fontFamily: "'Outfit', sans-serif",
          display: "flex", alignItems: "center", justifyContent: "center", gap: 4,
          opacity: audioUrl ? 1 : 0.5,
        }}>
          <WhatsAppIcon /> Send to Noor
        </button>
        {selection.youtube && (
          <button onClick={function() { window.open(selection.youtube, "_blank"); }} style={{
            padding: "10px 14px", border: "none", borderRadius: 8,
            background: "#ff0000", color: "#fff", fontSize: 12, fontWeight: 600,
            cursor: "pointer", fontFamily: "'Outfit', sans-serif",
          }}>
            ▶ Recipe
          </button>
        )}
      </div>
    </div>
  );
}

function HeyNoor() {
  const [activeUser, setActiveUser] = useState("prerna"); // "prerna" | "mohit"
  // Auto-select today's day (0=Mon, 4=Fri)
  const todayIndex = Math.max(0, Math.min(4, new Date().getDay() - 1)); // getDay: 0=Sun,1=Mon...
  const [selectedDay, setSelectedDay] = useState(todayIndex >= 0 && todayIndex <= 4 ? todayIndex : 0);
  const [favorites, setFavorites] = useState({});
  const [favMeals, setFavMeals] = useState([]); // stored fav meals list
  const [surpriseSelection, setSurpriseSelection] = useState(null); // {name, youtube} of selected surprise meal
  const [diceRolling, setDiceRolling] = useState(false);
  const [prernaPlans, setPrernaPlans] = useState(JSON.parse(JSON.stringify(prernaBasePlan)));
  const [mohitPlans, setMohitPlans] = useState(JSON.parse(JSON.stringify(mohitBasePlan)));
  const [mealOverrides, setMealOverrides] = useState({}); // keep for compatibility
  const [voiceStatus, setVoiceStatus] = useState({});
  const [prernaActive, setPrernaActive] = useState(
    Object.fromEntries(DAYS.map(d => [d, true]))
  );
  const [mohitActive, setMohitActive] = useState(
    Object.fromEntries(DAYS.map(d => [d, true]))
  );
  const [feedbackOpen, setFeedbackOpen] = useState(false);
  const [feedbackLog, setFeedbackLog] = useState([]);
  const [skipModal, setSkipModal] = useState(null);
  const [toast, setToast] = useState(null);
  const [surpriseOpen, setSurpriseOpen] = useState(false);
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [mealsExpanded, setMealsExpanded] = useState(false);
  const [voiceExpanded, setVoiceExpanded] = useState(false);
  const [elevenLabsConfig, setElevenLabsConfig] = useState({ apiKey: "", voiceId: "" });

  // Load saved ElevenLabs config on mount
  useEffect(() => {
    try {
        const saved = localStorage.getItem("elevenLabsConfig");
        if (saved) setElevenLabsConfig(JSON.parse(saved));
      } catch (e) {}
  }, []);

  // Save config whenever it changes
  const saveElevenLabsConfig = useCallback(async (config) => {
    setElevenLabsConfig(config);
    try {
      localStorage.setItem("elevenLabsConfig", JSON.stringify(config));
    } catch (e) {}
  }, []);

  // Request notification permission on mount
  useEffect(() => {
    if ("Notification" in window && Notification.permission === "default") {
      Notification.requestPermission();
    }
  }, []);

  // Schedule notifications at 7:30 AM and 4:30 PM
  useEffect(() => {
    function scheduleNotification(hour, minute, title, body) {
      const now = new Date();
      const target = new Date();
      target.setHours(hour, minute, 0, 0);
      if (target <= now) target.setDate(target.getDate() + 1); // next day if time passed
      const delay = target - now;

      return setTimeout(() => {
        // Only notify on weekdays
        const dayOfWeek = new Date().getDay();
        if (dayOfWeek >= 1 && dayOfWeek <= 5) {
          if ("Notification" in window && Notification.permission === "granted") {
            new Notification(title, { body, icon: "👋", tag: title });
          }
        }
        // Reschedule for next day
        scheduleNotification(hour, minute, title, body);
      }, delay);
    }

    const t1 = scheduleNotification(7, 30, "Hey! Noor — Morning 🌅", "Time to send breakfast + lunch instructions to Noor");
    const t2 = scheduleNotification(16, 30, "Hey! Noor — Evening 🌆", "Time to send dinner instructions to Noor");

    return () => { clearTimeout(t1); clearTimeout(t2); };
  }, []);

  const day = DAYS[selectedDay];
  const isToday = selectedDay === (todayIndex >= 0 && todayIndex <= 4 ? todayIndex : -1);
  const dayLabel = isToday ? "Today" : day;
  const prernaMeals = prernaPlans[day];
  const mohitMeals = mohitPlans[day];

  const showToast = useCallback((msg) => {
    setToast(msg);
    setTimeout(() => setToast(null), 2500);
  }, []);

  const toggleFav = (who, favDay, meal) => {
    const key = `${who}-${favDay}-${meal}`;
    const plans = who === "prerna" ? prernaPlans : mohitPlans;
    const mealData = plans[favDay] && plans[favDay][meal];
    setFavorites(prev => {
      const newFavs = { ...prev, [key]: !prev[key] };
      // Update favMeals list
      if (newFavs[key] && mealData) {
        setFavMeals(prev => {
          if (prev.some(f => f.key === key)) return prev;
          return [...prev, { key, who, day: favDay, mealType: meal, ...mealData }];
        });
      } else {
        setFavMeals(prev => prev.filter(f => f.key !== key));
      }
      return newFavs;
    });
  };

  const setVoice = (day, type, status) => {
    setVoiceStatus(prev => ({ ...prev, [`${day}-${type}`]: status }));
  };

  const handleWhatsApp = (script, day, type) => {
    const phone = (elevenLabsConfig && elevenLabsConfig.noorPhone) || "";
    const encoded = encodeURIComponent(script);
    const waUrl = phone ? `https://wa.me/${phone}?text=${encoded}` : `https://wa.me/?text=${encoded}`;
    window.open(waUrl, "_blank");
    setVoice(day, type, "sent");
    showToast("WhatsApp opened — voice note marked as sent");
  };

  const handleFeedback = (text) => {
    if (!text.trim()) return;
    const entry = { text, day, time: new Date().toLocaleTimeString(), date: new Date().toLocaleDateString() };
    setFeedbackLog(prev => [...prev, entry]);
    const phone = (elevenLabsConfig && elevenLabsConfig.noorPhone) || "";
    const encoded = encodeURIComponent(`Noor ke liye feedback (${day}):\n${text}`);
    const waUrl = phone ? `https://wa.me/${phone}?text=${encoded}` : `https://wa.me/?text=${encoded}`;
    window.open(waUrl, "_blank");
    setFeedbackOpen(false);
    showToast("Feedback sent to Noor via WhatsApp");
  };

  const handleSkipConfirm = () => {
    if (skipModal === "prerna") {
      setPrernaActive(prev => ({ ...prev, [day]: false }));
    } else {
      setMohitActive(prev => ({ ...prev, [day]: false }));
    }
    setSkipModal(null);
    showToast(`${skipModal === "prerna" ? "Prerna" : "Mohit"} marked as skipping ${day}`);
  };

  const currentMeals = activeUser === "prerna" ? prernaMeals : mohitMeals;

  const morningScript = useMemo(function() {
    return generateMorningScript(day, prernaPlans[day], mohitPlans[day], {
      prernaActive: prernaActive[day],
      mohitActive: mohitActive[day],
    });
  }, [day, prernaPlans, mohitPlans, prernaActive, mohitActive]);

  const eveningScript = useMemo(function() {
    return generateEveningScript(day, prernaPlans[day], mohitPlans[day], {
      prernaActive: prernaActive[day],
      mohitActive: mohitActive[day],
    });
  }, [day, prernaPlans, mohitPlans, prernaActive, mohitActive]);

  const currentWeight = activeUser === "prerna" ? PRERNA_WEIGHT : MOHIT_WEIGHT;
  const proteinTarget = `${Math.round(currentWeight * 1.2)}-${Math.round(currentWeight * 1.5)}g`;
  const dailyProtein = Object.values(currentMeals).reduce((s, m) => s + (m.protein || 0), 0);
  const dailyCal = Object.values(currentMeals).reduce((s, m) => s + (m.cal || 0), 0);
  const mealTypes = ["breakfast", "lunch", "snack", "dinner"];

  return (
    <div style={{
      fontFamily: "'Outfit', 'Segoe UI', sans-serif",
      background: theme.bg,
      color: theme.text,
      colorScheme: "light",
      minHeight: "100vh",
      maxWidth: 480,
      margin: "0 auto",
      position: "relative",
      WebkitTextSizeAdjust: "100%",
    }}>
      <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

      {/* Toast */}
      {toast && (
        <div style={{
          position: "fixed", top: 20, left: "50%", transform: "translateX(-50%)",
          background: "#2d2a26", color: "#fff", padding: "10px 20px",
          borderRadius: 12, fontSize: 13, fontWeight: 500, zIndex: 2000,
          boxShadow: "0 8px 30px rgba(0,0,0,0.2)", fontFamily: "'Outfit', sans-serif",
          animation: "fadeIn 0.3s ease",
        }}>
          {toast}
        </div>
      )}

      {/* Header */}
      <div style={{
        background: "#fff",
        padding: "24px 20px 16px",
        borderBottom: "1px solid #eee",
      }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
          <div>
            <h1 style={{ margin: 0, fontSize: 24, fontWeight: 800, letterSpacing: "-0.5px", color: theme.text }}>
              Hey! Noor <span style={{ fontSize: 22 }}>👋</span>
            </h1>
            <p style={{ margin: "2px 0 0", fontSize: 12, color: theme.textMuted }}>
              my daily meal app
            </p>
          </div>
          <div style={{ display: "flex", gap: 6 }}>
            <button onClick={() => setSettingsOpen(true)} style={{
              background: theme.tagBg, border: "none", borderRadius: 10,
              padding: "8px 12px", color: theme.textMuted, fontSize: 14,
              cursor: "pointer",
            }}>
              ⚙️
            </button>
            <button onClick={() => setFeedbackOpen(true)} style={{
              background: theme.tagBg, border: "none", borderRadius: 10,
              padding: "8px 12px", color: theme.textMuted, fontSize: 14,
              cursor: "pointer",
            }}>
              💬
            </button>
          </div>
        </div>

        {/* User Toggle */}
        <div style={{
          display: "flex", background: theme.tagBg, borderRadius: 10, padding: 3,
        }}>
          {["prerna", "mohit"].map(u => (
            <button key={u} onClick={() => setActiveUser(u)} style={{
              flex: 1, padding: "8px 0", border: "none", borderRadius: 8,
              background: activeUser === u ? "#fff" : "transparent",
              color: activeUser === u ? theme.text : theme.textMuted,
              fontSize: 13, fontWeight: activeUser === u ? 700 : 500, cursor: "pointer", fontFamily: "'Outfit', sans-serif",
              transition: "all 0.2s",
              boxShadow: activeUser === u ? "0 1px 4px rgba(0,0,0,0.08)" : "none",
            }}>
              {u === "prerna" ? "Prerna" : "Mohit"}
            </button>
          ))}
        </div>
      </div>

      {/* Day Selector */}
      <div style={{ display: "flex", gap: 6, padding: "16px 16px 8px", overflowX: "auto" }}>
        {DAYS.map((d, i) => {
          const isActive = i === selectedDay;
          const isTodayTab = i === (todayIndex >= 0 && todayIndex <= 4 ? todayIndex : -1);
          const pSkip = !prernaActive[d];
          const mSkip = !mohitActive[d];
          return (
            <button key={d} onClick={() => setSelectedDay(i)} style={{
              flex: 1, minWidth: 54, padding: "10px 4px 8px", border: "none",
              borderRadius: 12, cursor: "pointer", fontFamily: "'Outfit', sans-serif",
              background: isActive ? theme.text : theme.card,
              color: isActive ? "#fff" : theme.text,
              fontSize: 12, fontWeight: isActive ? 700 : 500,
              boxShadow: isActive ? "0 2px 10px rgba(0,0,0,0.12)" : "none",
              transition: "all 0.2s",
              position: "relative",
            }}>
              {DAY_SHORT[i]}
              {isTodayTab && (
                <div style={{ width: 4, height: 4, borderRadius: "50%", background: isActive ? "#fff" : theme.accent, margin: "3px auto 0" }} />
              )}
              {(pSkip || mSkip) && (
                <div style={{ fontSize: 9, marginTop: 2, opacity: 0.7 }}>
                  {pSkip && mSkip ? "Both out" : pSkip ? "P out" : "M out"}
                </div>
              )}
            </button>
          );
        })}
      </div>

      {/* Daily Summary */}
      <div style={{ padding: "8px 16px 4px" }}>
        <div style={{
          background: theme.card, borderRadius: 14, padding: "16px 18px",
          border: `1px solid ${theme.border}`,
        }}>
          <div style={{ fontSize: 11, color: theme.textMuted, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 10 }}>
            {activeUser === "prerna" ? "Prerna" : "Mohit"}'s Daily Intake — {dayLabel}
          </div>
          <div style={{ display: "flex", gap: 12 }}>
            <div style={{
              flex: 1, background: theme.accentLight, borderRadius: 12, padding: "12px 14px",
            }}>
              <div style={{ fontSize: 10, fontWeight: 700, color: theme.accent, textTransform: "uppercase", letterSpacing: "0.05em" }}>
                Protein
              </div>
              <div style={{ fontSize: 24, fontWeight: 800, color: theme.text, marginTop: 2, fontFamily: "'Outfit', sans-serif" }}>
                ~{dailyProtein}g
              </div>
              <div style={{ fontSize: 10, color: theme.textMuted, marginTop: 2 }}>
                target {proteinTarget}
              </div>
            </div>
            <div style={{
              flex: 1, background: "#e8faf7", borderRadius: 12, padding: "12px 14px",
            }}>
              <div style={{ fontSize: 10, fontWeight: 700, color: theme.teal, textTransform: "uppercase", letterSpacing: "0.05em" }}>
                Calories
              </div>
              <div style={{ fontSize: 24, fontWeight: 800, color: theme.text, marginTop: 2, fontFamily: "'Outfit', sans-serif" }}>
                ~{dailyCal}
              </div>
              <div style={{ fontSize: 10, color: theme.textMuted, marginTop: 2 }}>
                kcal total
              </div>
            </div>
          </div>
        </div>
      </div>

      {/* Skip / Unskip Controls */}
      <div style={{ padding: "8px 16px 0", display: "flex", gap: 8 }}>
        <button
          onClick={() => prernaActive[day] ? setSkipModal("prerna") : setPrernaActive(p => ({ ...p, [day]: true }))}
          style={{
            flex: 1, padding: "9px 0", border: "none",
            borderRadius: 10, background: prernaActive[day] ? "#e8f8ee" : "#fff0f0",
            color: prernaActive[day] ? "#2d9a5a" : theme.red,
            fontSize: 11, fontWeight: 600, cursor: "pointer", fontFamily: "'Outfit', sans-serif",
          }}
        >
          {prernaActive[day] ? "✓ Prerna eating" : "✗ Prerna out (undo)"}
        </button>
        <button
          onClick={() => mohitActive[day] ? setSkipModal("mohit") : setMohitActive(p => ({ ...p, [day]: true }))}
          style={{
            flex: 1, padding: "9px 0", border: "none",
            borderRadius: 10, background: mohitActive[day] ? "#e8f8ee" : "#fff0f0",
            color: mohitActive[day] ? "#2d9a5a" : theme.red,
            fontSize: 11, fontWeight: 600, cursor: "pointer", fontFamily: "'Outfit', sans-serif",
          }}
        >
          {mohitActive[day] ? "✓ Mohit eating" : "✗ Mohit out (undo)"}
        </button>
      </div>

      {/* Meals Section — Card container, collapsible */}
      <div style={{ padding: "8px 16px 0" }}>
        <div style={{
          background: theme.card, borderRadius: 14, padding: "16px 18px",
          border: `1px solid ${theme.border}`,
        }}>
          <button onClick={() => setMealsExpanded(!mealsExpanded)} style={{
            display: "flex", justifyContent: "space-between", alignItems: "center", width: "100%",
            background: "none", border: "none", cursor: "pointer", padding: 0,
          }}>
            <div style={{ fontSize: 11, color: theme.textMuted, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.06em" }}>
              🍽️ {activeUser === "prerna" ? "Prerna" : "Mohit"}'s Meals — {dayLabel}
            </div>
            <span style={{ fontSize: 12, color: theme.textMuted, transform: mealsExpanded ? "rotate(180deg)" : "rotate(0)", transition: "transform 0.2s" }}>▼</span>
          </button>
          {mealsExpanded && (
            <div style={{ marginTop: 12 }}>
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {mealTypes.filter(type => currentMeals[type]).map(type => (
                  <MealCard
                    key={type + "-" + (currentMeals[type].name || "") + "-" + (currentMeals[type].protein || 0)}
                    meal={currentMeals[type]}
                    mealType={type}
                    who={activeUser}
                    isFav={favorites[`${activeUser}-${day}-${type}`]}
                    onToggleFav={() => toggleFav(activeUser, day, type)}
                    onEdit={(updated) => {
                      if (activeUser === "prerna") {
                        setPrernaPlans(prev => {
                          const newPlans = JSON.parse(JSON.stringify(prev));
                          newPlans[day][type] = { ...newPlans[day][type], ...updated };
                          return newPlans;
                        });
                      } else {
                        setMohitPlans(prev => {
                          const newPlans = JSON.parse(JSON.stringify(prev));
                          newPlans[day][type] = { ...newPlans[day][type], ...updated };
                          return newPlans;
                        });
                      }
                      showToast("Meal updated!");
                    }}
                  />
                ))}
              </div>

              {/* Favs inside meals section */}
              {favMeals.length > 0 && (
                <div style={{ marginTop: 14, paddingTop: 12, borderTop: `1px solid ${theme.border}` }}>
                  <div style={{ fontSize: 11, fontWeight: 600, color: theme.textMuted, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 8 }}>
                    ❤️ Favourites
                  </div>
                  <div style={{ display: "flex", gap: 8, overflowX: "auto", paddingBottom: 4 }}>
                    {favMeals.map((fav) => (
                      <div key={fav.key} style={{
                        background: theme.tagBg, borderRadius: 10, padding: "8px 12px",
                        minWidth: 130, flexShrink: 0,
                      }}>
                        <div style={{ fontSize: 12, fontWeight: 600, color: theme.text, fontFamily: "'Outfit', sans-serif" }}>
                          {fav.name}
                        </div>
                        <div style={{ fontSize: 10, color: theme.textMuted, marginTop: 2 }}>
                          {fav.who === "prerna" ? "P" : "M"} · {fav.day} · ~{fav.protein}g
                        </div>
                        <button onClick={() => toggleFav(fav.who, fav.day, fav.mealType)} style={{
                          marginTop: 4, background: "none", border: "none", cursor: "pointer",
                          fontSize: 10, color: theme.red, padding: 0, fontFamily: "'Outfit', sans-serif",
                        }}>
                          Remove
                        </button>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      </div>

      {/* Voice Notes Section — Card container, collapsible */}
      <div style={{ padding: "8px 16px 0" }}>
        <div style={{
          background: theme.card, borderRadius: 14, padding: "16px 18px",
          border: `1px solid ${theme.border}`,
        }}>
          <button onClick={() => setVoiceExpanded(!voiceExpanded)} style={{
            display: "flex", justifyContent: "space-between", alignItems: "center", width: "100%",
            background: "none", border: "none", cursor: "pointer", padding: 0,
          }}>
            <div style={{ fontSize: 11, color: theme.textMuted, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.06em" }}>
              🎙️ Voice Notes for Noor — {dayLabel}
            </div>
            <span style={{ fontSize: 12, color: theme.textMuted, transform: voiceExpanded ? "rotate(180deg)" : "rotate(0)", transition: "transform 0.2s" }}>▼</span>
          </button>
          {voiceExpanded && (
            <div style={{ marginTop: 12 }}>
              {(!prernaActive[day] && !mohitActive[day]) ? (
                <div style={{
                  background: "#fdf5f5", borderRadius: 12, padding: 20, textAlign: "center",
                }}>
                  <div style={{ fontSize: 28, marginBottom: 6 }}>🚫</div>
                  <div style={{ fontSize: 13, fontWeight: 600, color: theme.red }}>Both are out today</div>
                  <div style={{ fontSize: 11, color: theme.textMuted, marginTop: 2 }}>No voice notes needed</div>
                </div>
              ) : (
                <>
                  <VoiceNotePanel
                    title="Morning — Nashta + Lunch"
                    time="7:30 AM"
                    script={morningScript}
                    status={voiceStatus[`${day}-morning`]}
                    onSend={() => { setVoice(day, "morning", "sent"); showToast("Voice note sent!"); }}
                    onCancel={() => { setVoice(day, "morning", "cancelled"); showToast("Morning voice note cancelled"); }}
                    day={day}
                    elevenLabsConfig={elevenLabsConfig}
                  />
                  <VoiceNotePanel
                    title="Evening — Dinner"
                    time="4:30 PM"
                    script={eveningScript}
                    status={voiceStatus[`${day}-evening`]}
                    onSend={() => { setVoice(day, "evening", "sent"); showToast("Voice note sent!"); }}
                    onCancel={() => { setVoice(day, "evening", "cancelled"); showToast("Evening voice note cancelled"); }}
                    day={day}
                    elevenLabsConfig={elevenLabsConfig}
                  />
                </>
              )}
            </div>
          )}
        </div>
      </div>

      {/* ─── Bored! Surprise Me — Fun section at bottom ─── */}
      <div style={{ padding: "20px 16px 0" }}>
        <div style={{
          background: "linear-gradient(145deg, #fff0e8 0%, #f0edfc 50%, #e8faf7 100%)",
          borderRadius: 20, padding: "20px 18px", position: "relative", overflow: "hidden",
          border: "1px solid #f0ebf5",
        }}>
          {/* Decorative sparkles */}
          <div style={{ position: "absolute", top: 10, right: 14, fontSize: 24, opacity: 0.2, color: theme.accent }}>✦</div>
          <div style={{ position: "absolute", top: 36, right: 42, fontSize: 14, opacity: 0.15, color: theme.mohit }}>✦</div>
          <div style={{ position: "absolute", bottom: 14, left: 18, fontSize: 16, opacity: 0.12, color: theme.teal }}>✦</div>

          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}>
            <span style={{ fontSize: 22 }}>✨</span>
            <div>
              <div style={{ fontSize: 16, fontWeight: 700, color: theme.text, fontFamily: "'Outfit', sans-serif" }}>
                Bored! Surprise Me
              </div>
              <div style={{ fontSize: 11, color: theme.textMuted, marginTop: 2 }}>
                Not feeling today's menu? Let's shake things up
              </div>
            </div>
          </div>

          <button onClick={() => {
            if (navigator.vibrate) navigator.vibrate([20, 40, 20, 40, 30]);
            setDiceRolling(true);
            setTimeout(() => { setDiceRolling(false); setSurpriseOpen(true); }, 1000);
          }} disabled={diceRolling} style={{
            width: "100%", padding: "12px 0",
            border: "none",
            borderRadius: 12,
            background: diceRolling
              ? "linear-gradient(135deg, #ff5733, #ffc312, #5856d6, #ff2d55, #ff5733)"
              : "#8e7cc3",
            backgroundSize: diceRolling ? "400% 400%" : "100% 100%",
            animation: diceRolling ? "gradientShift 0.6s ease infinite" : "none",
            color: "#fff", fontSize: 13, fontWeight: 600, cursor: diceRolling ? "wait" : "pointer",
            fontFamily: "'Outfit', sans-serif",
            display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
            transition: "all 0.3s",
          }}>
            <span style={{
              display: "inline-block", fontSize: 16,
              animation: diceRolling ? "sparkle 0.3s ease infinite" : "none",
            }}>✨</span>
            {diceRolling ? "Finding something exciting..." : "Show me something new"}
          </button>

          {/* Selected surprise meal */}
          {surpriseSelection && (
            <div style={{ marginTop: 12 }}>
              <SurpriseVoiceCard
                selection={surpriseSelection}
                onDismiss={() => setSurpriseSelection(null)}
                elevenLabsConfig={elevenLabsConfig}
                showToast={showToast}
              />
            </div>
          )}
        </div>
      </div>

      {/* Feedback Log */}
      {feedbackLog.length > 0 && (
        <div style={{ padding: "14px 16px 0" }}>
          <h3 style={{ fontSize: 13, fontWeight: 700, color: theme.text, margin: "0 0 8px", fontFamily: "'Outfit', sans-serif" }}>
            📝 Feedback History
          </h3>
          {feedbackLog.slice(-3).reverse().map((f, i) => (
            <div key={i} style={{
              background: theme.card, borderRadius: 10, padding: "10px 14px", marginBottom: 8,
              border: `1px solid ${theme.border}`, fontSize: 13,
            }}>
              <div style={{ fontWeight: 600, color: theme.text }}>{f.text}</div>
              <div style={{ fontSize: 11, color: theme.textMuted, marginTop: 4 }}>{f.day} · {f.date} · {f.time}</div>
            </div>
          ))}
        </div>
      )}

      {/* Bottom Spacer */}
      <div style={{ height: 40 }} />

      {/* Modals */}
      <FeedbackModal isOpen={feedbackOpen} onClose={() => setFeedbackOpen(false)} onSubmit={handleFeedback} />
      <SkipDayModal isOpen={!!skipModal} who={skipModal} onClose={() => setSkipModal(null)} onConfirm={handleSkipConfirm} />
      <SurpriseModal isOpen={surpriseOpen} onClose={() => setSurpriseOpen(false)} onSelect={(recipe) => { setSurpriseSelection(recipe); setSurpriseOpen(false); }} />
      <SettingsModal isOpen={settingsOpen} onClose={() => setSettingsOpen(false)} config={elevenLabsConfig} onSave={saveElevenLabsConfig} />
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(HeyNoor));
  </script>
</body>
</html>
