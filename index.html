// ─── Hindi Script Generator ─────────────────────────────────────────────────
// Convert numbers to Hindi words for TTS
function numToHindi(n) {
  const map = {
    0: "zero", 1: "ek", 2: "do", 3: "teen", 4: "chaar", 5: "paanch",
    6: "chheh", 7: "saat", 8: "aath", 9: "nau", 10: "das",
    11: "gyarah", 12: "baarah", 13: "terah", 14: "chaudah", 15: "pandrah",
    16: "solah", 17: "satrah", 18: "athaarah", 19: "unees", 20: "bees",
    25: "pacchees", 30: "tees", 40: "chaalis", 50: "pachaas",
    60: "saath", 70: "sattar", 80: "assi", 90: "nabbe", 100: "sau",
    150: "dedh sau", 200: "do sau", 250: "dhaai sau", 300: "teen sau",
    400: "chaar sau", 500: "paanch sau",
  };
  if (map[n]) return map[n];
  if (n > 100 && n < 200) return "sau " + (map[n - 100] || (n - 100));
  if (n > 200 && n < 300) return "do sau " + (map[n - 200] || (n - 200));
  return String(n);
}

// Convert item descriptions to Hindi-friendly versions for voice notes
function hindiItems(items) {
  return items
    .replace(/(\d+)g rice \(dry\)/g, (_, n) => `${numToHindi(parseInt(n))} gram chawal`)
    .replace(/(\d+)g rice/g, (_, n) => `${numToHindi(parseInt(n))} gram chawal`)
    .replace(/(\d+)g chicken/g, (_, n) => `${numToHindi(parseInt(n))} gram chicken`)
    .replace(/(\d+)g veggies/g, (_, n) => `${numToHindi(parseInt(n))} gram sabzi`)
    .replace(/(\d+)g chhole/g, (_, n) => `${numToHindi(parseInt(n))} gram chhole`)
    .replace(/(\d+)g paneer/g, (_, n) => `${numToHindi(parseInt(n))} gram paneer`)
    .replace(/(\d+)g chawal/g, (_, n) => `${numToHindi(parseInt(n))} gram chawal`)
    .replace(/(\d+)g/g, (_, n) => `${numToHindi(parseInt(n))} gram`)
    .replace(/rice/g, 'chawal');
}

// Convert the generated script's remaining numbers to Hindi
function hindiScript(text) {
  return text
    .replace(/Total (\d+)/g, (_, n) => `Total ${numToHindi(parseInt(n))}`)
    .replace(/(\d+) ande/g, (_, n) => `${numToHindi(parseInt(n))} ande`)
    .replace(/(\d+) mere/g, (_, n) => `${numToHindi(parseInt(n))} mere`)
    .replace(/(\d+) bhaiya/g, (_, n) => `${numToHindi(parseInt(n))} bhaiya`)
    .replace(/(\d+) roti/g, (_, n) => `${numToHindi(parseInt(n))} roti`)
    .replace(/(\d+) paratha/g, (_, n) => `${numToHindi(parseInt(n))} paratha`)
    .replace(/(\d+) mini/g, (_, n) => `${numToHindi(parseInt(n))} mini`)
    .replace(/(\d+)g chawal/g, (_, n) => `${numToHindi(parseInt(n))} gram chawal`)
    .replace(/(\d+)g/g, (_, n) => `${numToHindi(parseInt(n))} gram`);
}

function generateMorningScript(day, prerna, mohit, config) {
  const { prernaActive, mohitActive } = config;
  let lines = [`Noor, aaj subah aur dopahar ka khana:`];

  if (prernaActive && mohitActive) {
    // Combined instructions — both get 2 eggs
    lines.push(`Nashta: Total 4 ande banana hai — 2 mere liye half fried, pack karna. 2 bhaiya ke liye half fried, ghar pe rakhna.`);

    // Lunch
    lines.push(`Dopahar ka khana:`);
    lines.push(`Mera lunch pack karna hai:`);
    lines.push(`→ ${hindiItems(prerna.lunch.items)}`);
    lines.push(`Bhaiya ka lunch ghar pe rakhna:`);
    lines.push(`→ ${hindiItems(mohit.lunch.items)}`);
  } else if (prernaActive) {
    lines.push(`Aaj sirf mera khana banana hai.`);
    lines.push(`Nashta: 2 ande half fried — pack karna.`);
    lines.push(`Lunch: ${hindiItems(prerna.lunch.items)} — pack karna.`);
  } else if (mohitActive) {
    lines.push(`Aaj sirf bhaiya ka khana banana hai.`);
    lines.push(`Nashta: 2 ande half fried — ghar pe rakhna.`);
    lines.push(`Lunch: ${hindiItems(mohit.lunch.items)} — ghar pe rakhna.`);
  }

  return hindiScript(lines.join("\n"));
}

function generateEveningScript(day, prerna, mohit, config) {
  const { prernaActive, mohitActive } = config;
  if (day === "Friday") return `Noor, aaj dinner bahar se hoga. Kuch banana nahi hai.`;

  let lines = [`Noor, aaj ka dinner:`];

  if (prernaActive && mohitActive) {
    // Combine common items, only separate carbs
    const pItems = prerna.dinner.items;
    const mItems = mohit.dinner.items;

    // Smart combining for chicken+veggies days (Mon, Tue)
    const pChickenMatch = pItems.match(/(\d+)g chicken/);
    const mChickenMatch = mItems.match(/(\d+)g chicken/);
    const pVeggiesMatch = pItems.match(/(\d+)g veggies/);
    const mVeggiesMatch = mItems.match(/(\d+)g veggies/);

    if (pChickenMatch && mChickenMatch) {
      const totalChicken = parseInt(pChickenMatch[1]) + parseInt(mChickenMatch[1]);
      lines.push(`${numToHindi(totalChicken)} gram chicken ki curry banani hai.`);
    }

    if (pVeggiesMatch && mVeggiesMatch) {
      const totalVeggies = parseInt(pVeggiesMatch[1]) + parseInt(mVeggiesMatch[1]);
      lines.push(`${numToHindi(totalVeggies)} gram sabzi airfry karna hai.`);
    }

    // Carb differences
    const pRiceMatch = pItems.match(/(\d+)g rice/);
    const mRiceMatch = mItems.match(/(\d+)g rice/);
    const pRotiMatch = pItems.match(/(\d+)\s*roti/);
    const mRotiMatch = mItems.match(/(\d+)\s*roti/);

    let carbParts = [];
    if (pRiceMatch) carbParts.push(`${numToHindi(parseInt(pRiceMatch[1]))} gram chawal mere liye`);
    if (pRotiMatch && !pRiceMatch) carbParts.push(`${numToHindi(parseInt(pRotiMatch[1]))} roti mere liye`);
    if (mRiceMatch) carbParts.push(`${numToHindi(parseInt(mRiceMatch[1]))} gram chawal bhaiya ke liye`);
    if (mRotiMatch) carbParts.push(`${numToHindi(parseInt(mRotiMatch[1]))} roti bhaiya ke liye`);

    if (carbParts.length > 0) {
      lines.push(carbParts.join(', ') + '.');
    }

    // For non-chicken days (Wed rajma, Thu paneer) — just describe the meal
    if (!pChickenMatch && !mChickenMatch) {
      lines = [`Noor, aaj ka dinner:`];
      lines.push(hindiItems(pItems));
    }
  } else if (prernaActive) {
    lines.push(`Aaj sirf mera dinner banana hai:`);
    lines.push(`→ ${hindiItems(prerna.dinner.items)}`);
  } else if (mohitActive) {
    lines.push(`Aaj sirf bhaiya ka dinner banana hai:`);
    lines.push(`→ ${hindiItems(mohit.dinner.items)}`);
  }

  return hindiScript(lines.join("\n"));
}

function MealCard({ meal, mealType, isFav, onToggleFav, who, onEdit }) {
  const accentColor = who === "mohit" ? theme.mohit : theme.accent;
  const lightBg = who === "mohit" ? theme.mohitLight : theme.accentLight;
  const typeLabels = { breakfast: "Nashta", lunch: "Lunch", snack: "Snack", dinner: "Dinner" };
  const packLabel = meal.selfManaged ? "🎒 Self" : meal.packForPrerna ? "📦 Pack" : meal.isOut ? "🍽️ Out" : "🏠 Home";
  const [editing, setEditing] = useState(false);
  const [editName, setEditName] = useState(meal.name);
  const [editItems, setEditItems] = useState(meal.items);
  const [editProtein, setEditProtein] = useState(meal.protein);
  const [editCal, setEditCal] = useState(meal.cal);

  const handleSave = () => {
    onEdit && onEdit({ name: editName, items: editItems, protein: Number(editProtein), cal: Number(editCal) });
    setEditing(false);
  };

  return (
    <div style={{
      background: theme.card,
      borderRadius: 14,
      padding: "14px 16px",
      border: `1px solid ${editing ? accentColor : theme.border}`,
      position: "relative",
      transition: "all 0.2s",
    }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 }}>
        <div>
          <span style={{
            fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em",
            color: accentColor, background: lightBg, padding: "3px 8px", borderRadius: 6,
          }}>{typeLabels[mealType]}</span>
          <span style={{
            fontSize: 10, color: theme.textMuted, marginLeft: 6,
            background: theme.tagBg, padding: "3px 8px", borderRadius: 6,
          }}>{packLabel}</span>
        </div>
        <div style={{ display: "flex", gap: 6 }}>
          <button onClick={() => { setEditing(!editing); setEditName(meal.name); setEditItems(meal.items); setEditProtein(meal.protein); setEditCal(meal.cal); }} style={{
            background: "none", border: "none", cursor: "pointer", padding: 2, fontSize: 14,

function VoiceNotePanel({ title, time, script, status, onSend, onCancel, day, elevenLabsConfig }) {
  const isCancelled = status === "cancelled";
  const isSent = status === "sent";
  const [scriptExpanded, setScriptExpanded] = useState(false);
  const [audioMode, setAudioMode] = useState("ai"); // "ai" | "record"
  const [isGenerating, setIsGenerating] = useState(false);
  const [audioUrl, setAudioUrl] = useState(null);
  const [audioBlob, setAudioBlob] = useState(null);
  const [isPlaying, setIsPlaying] = useState(false);
  const [isRecording, setIsRecording] = useState(false);
  const [recordingTime, setRecordingTime] = useState(0);
  const [mediaRecorder, setMediaRecorder] = useState(null);
  const [error, setError] = useState(null);
  const audioRef = useRef(null);
  const timerRef = useRef(null);

  // Generate audio with ElevenLabs
  const handleGenerate = async () => {
    if (!(elevenLabsConfig && elevenLabsConfig.apiKey) || !(elevenLabsConfig && elevenLabsConfig.voiceId)) {
      setError("Please set your ElevenLabs API key and Voice ID in Settings ⚙️");
      return;
    }

    setIsGenerating(true);
    setError(null);

    try {
      const response = await fetch(
        `https://api.elevenlabs.io/v1/text-to-speech/${elevenLabsConfig.voiceId}`,
        {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "xi-api-key": elevenLabsConfig.apiKey,
          },
          body: JSON.stringify({
            text: script,
            model_id: "eleven_v3",
            voice_settings: {
              stability: 0.75,
              similarity_boost: 0.8,
            },
          }),
        }
      );

      if (!response.ok) {
        const errData = await response.json().catch(() => ({}));
        throw new Error((errData && errData.detail && errData.detail.message) || `API error: ${response.status}`);
      }

      const blob = await response.blob();
      const url = URL.createObjectURL(blob);
      setAudioUrl(url);
      setAudioBlob(blob);
      setAudioMode("ai");
    } catch (err) {
      setError(err.message || "Failed to generate audio. Check your API key and Voice ID.");
    } finally {
      setIsGenerating(false);
    }
  };

  // Play/pause audio
  const handlePlayPause = () => {
    if (!audioRef.current) return;
    if (isPlaying) {
      audioRef.current.pause();
      setIsPlaying(false);
    } else {
      audioRef.current.play();
      setIsPlaying(true);
    }
  };

  // Record own voice
  const handleStartRecording = async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const recorder = new MediaRecorder(stream);
      const chunks = [];

      recorder.ondataavailable = (e) => chunks.push(e.data);
      recorder.onstop = () => {
        const blob = new Blob(chunks, { type: "audio/webm" });
        const url = URL.createObjectURL(blob);
        setAudioUrl(url);
        setAudioBlob(blob);
        setAudioMode("record");
        stream.getTracks().forEach(t => t.stop());
      };

      recorder.start();
      setMediaRecorder(recorder);
      setIsRecording(true);
      setRecordingTime(0);
      timerRef.current = setInterval(() => setRecordingTime(t => t + 1), 1000);
    } catch (err) {
      setError("Microphone access denied. Please allow mic access.");
    }
  };

  const handleStopRecording = () => {
    if (mediaRecorder && mediaRecorder.state === "recording") {
      mediaRecorder.stop();
      setIsRecording(false);
      clearInterval(timerRef.current);
    }
  };

  const handleClearAudio = () => {
    if (audioUrl) URL.revokeObjectURL(audioUrl);
    setAudioUrl(null);
    setAudioBlob(null);
    setIsPlaying(false);
  };

  const formatTime = (s) => `${Math.floor(s / 60)}:${(s % 60).toString().padStart(2, "0")}`;

  return (
    <div style={{
      background: isCancelled ? "#fdf5f5" : isSent ? "#f0faf0" : theme.card,
      borderRadius: 16,
      padding: "18px 20px",
      border: `1px solid ${isCancelled ? "#f0d0d0" : isSent ? "#c0e8c0" : theme.border}`,
      marginBottom: 14,
    }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <MicIcon />
          <div>
            <div style={{ fontSize: 14, fontWeight: 700, color: theme.text, fontFamily: "'Outfit', sans-serif" }}>{title}</div>
            <div style={{ fontSize: 11, color: theme.textMuted }}>Scheduled: {time}</div>
          </div>
        </div>
        <div style={{
          fontSize: 11, fontWeight: 700, padding: "4px 10px", borderRadius: 20,
          background: isCancelled ? "#fce4e4" : isSent ? "#d4f5d4" : theme.accentLight,
          color: isCancelled ? theme.red : isSent ? "#2a8a2a" : theme.accent,
        }}>
          {isCancelled ? "Cancelled" : isSent ? "Sent ✓" : "Pending"}
        </div>
      </div>

      {/* Script text — collapsible */}
      <button onClick={() => setScriptExpanded(!scriptExpanded)} style={{
        width: "100%", background: "#f6f5f3", borderRadius: 10, padding: "10px 14px",
        border: "none", cursor: "pointer", marginBottom: 12,
        display: "flex", justifyContent: "space-between", alignItems: "center",
        opacity: isCancelled ? 0.5 : 1,
      }}>
        <span style={{ fontSize: 12, color: theme.textMuted, fontFamily: "'Outfit', sans-serif" }}>
          {scriptExpanded ? "Hide message" : "View message"}
        </span>
        <span style={{ fontSize: 14, color: theme.textMuted, transform: scriptExpanded ? "rotate(180deg)" : "rotate(0)", transition: "transform 0.2s" }}>▼</span>
      </button>
      {scriptExpanded && (
        <div style={{
          background: "#f6f5f3", borderRadius: 10, padding: "12px 14px",
          fontSize: 13, lineHeight: 1.7, color: theme.text, whiteSpace: "pre-wrap",
          fontFamily: "'Outfit', sans-serif", marginBottom: 12, marginTop: -8,
          borderLeft: `3px solid ${theme.accent}`, opacity: isCancelled ? 0.5 : 1,
        }}>
          {script}
        </div>
      )}

      {/* Audio Section */}
      {!isCancelled && !isSent && (
        <>
          {/* Error */}
          {error && (
            <div style={{
              background: "#fef2f2", border: "1px solid #fecaca", borderRadius: 10,
              padding: "8px 12px", marginBottom: 10, fontSize: 12, color: "#dc2626",
            }}>
              {error}
            </div>
          )}

          {/* No audio yet — show generate + record buttons */}
          {!audioUrl && !isRecording && (
            <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
              <button onClick={handleGenerate} disabled={isGenerating} style={{
                flex: 1, padding: "12px 0", border: "none", borderRadius: 12, cursor: "pointer",
                background: isGenerating ? "#eee" : theme.text,
                color: "#fff", fontSize: 13, fontWeight: 700, fontFamily: "'Outfit', sans-serif",
                display: "flex", alignItems: "center", justifyContent: "center", gap: 6,
                opacity: isGenerating ? 0.7 : 1,
              }}>
                {isGenerating ? (
                  <>
                    <span style={{ animation: "spin 1s linear infinite", display: "inline-block" }}>⏳</span>
                    Generating...
                  </>
                ) : (
                  <>🎙️ Generate with My Voice</>
                )}
              </button>
              <button onClick={handleStartRecording} style={{
                padding: "12px 16px", border: `1.5px solid ${theme.border}`, borderRadius: 12,
                cursor: "pointer", background: theme.card, color: theme.text,
                fontSize: 13, fontWeight: 600, fontFamily: "'Outfit', sans-serif",
                display: "flex", alignItems: "center", gap: 4,
              }}>
                🔴 Record
              </button>
            </div>
          )}

          {/* Recording in progress */}
          {isRecording && (
            <div style={{
              background: "linear-gradient(135deg, #ff4757, #ff6b81)", borderRadius: 12,
              padding: "14px 16px", marginBottom: 12, display: "flex", alignItems: "center", gap: 12,
            }}>
              <div style={{
                width: 12, height: 12, borderRadius: "50%", background: "#fff",
                animation: "pulse 1s ease-in-out infinite",
              }} />
              <div style={{ flex: 1, color: "#fff" }}>
                <div style={{ fontSize: 13, fontWeight: 700, fontFamily: "'Outfit', sans-serif" }}>
                  Recording... {formatTime(recordingTime)}
                </div>
                <div style={{ fontSize: 10, opacity: 0.9, marginTop: 2 }}>Read the script above</div>
              </div>
              <button onClick={handleStopRecording} style={{
                padding: "8px 16px", border: "none", borderRadius: 8,
                background: "rgba(255,255,255,0.3)", color: "#fff",
                fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "'Outfit', sans-serif",
              }}>
                ⏹ Stop
              </button>
            </div>
          )}

          {/* Audio ready — player */}
          {audioUrl && !isRecording && (
            <div style={{
              background: isPlaying ? theme.text : "#f4f4f2",
              borderRadius: 12, padding: "12px 14px", marginBottom: 12,
              display: "flex", alignItems: "center", gap: 10, transition: "all 0.3s",
            }}>
              <audio
                ref={(el) => {
                  audioRef.current = el;
                  if (el) el.onended = () => setIsPlaying(false);
                }}
                src={audioUrl}
              />
              <button onClick={handlePlayPause} style={{
                width: 40, height: 40, borderRadius: "50%", border: "none", cursor: "pointer",
                background: isPlaying ? "rgba(255,255,255,0.25)" : theme.accent,
                color: "#fff", display: "flex", alignItems: "center", justifyContent: "center",
                fontSize: 18, flexShrink: 0,
              }}>
                {isPlaying ? "⏸" : "▶"}
              </button>
              <div style={{ flex: 1 }}>
                <div style={{
                  fontSize: 12, fontWeight: 600, fontFamily: "'Outfit', sans-serif",
                  color: isPlaying ? "#fff" : theme.text,
                }}>
                  {audioMode === "ai" ? "🎙️ AI Voice (ElevenLabs)" : "🎤 Your Recording"}
                </div>
                {isPlaying && (
                  <div style={{ display: "flex", gap: 2, marginTop: 6 }}>
                    {[...Array(24)].map((_, i) => (
                      <div key={i} style={{
                        width: 3, borderRadius: 2,
                        height: 4 + Math.random() * 14,
                        background: "rgba(255,255,255,0.6)",
                        animation: `waveBar 0.5s ease-in-out ${i * 0.05}s infinite alternate`,
                      }} />
                    ))}
                  </div>
                )}
                {!isPlaying && (
                  <div style={{ fontSize: 10, color: isPlaying ? "rgba(255,255,255,0.7)" : theme.textMuted, marginTop: 2 }}>
                    Ready to send to Noor
                  </div>
                )}
              </div>
              <button onClick={handleClearAudio} style={{
                background: "none", border: "none", cursor: "pointer", padding: 4,
                color: isPlaying ? "rgba(255,255,255,0.6)" : theme.textMuted, fontSize: 14,
              }} title="Remove & re-do">
                ✕
              </button>
            </div>
          )}

          {/* Action buttons */}
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={() => {
              const phone = (elevenLabsConfig && elevenLabsConfig.noorPhone) || "";
              if (audioBlob) {
                // Download the audio file
                const a = document.createElement("a");
                a.href = audioUrl;
                a.download = `noor-${day}-${title.includes("Morning") ? "morning" : "dinner"}.mp3`;
                a.click();
                // Open WhatsApp to Noor (no text — user attaches the audio)
                setTimeout(() => {
                  const waUrl = phone ? `https://wa.me/${phone}` : `https://wa.me/`;
                  window.open(waUrl, "_blank");
                  onSend();
                }, 500);
              }
            }} style={{
              flex: 1, display: "flex", alignItems: "center", justifyContent: "center", gap: 6,
              background: audioUrl ? theme.green : "#a0d8a0",
              color: "#fff", border: "none", borderRadius: 10, padding: "10px 0",
              fontSize: 13, fontWeight: 600, cursor: audioUrl ? "pointer" : "default",
              fontFamily: "'Outfit', sans-serif", opacity: audioUrl ? 1 : 0.6,
            }}>
              <WhatsAppIcon /> {audioUrl ? "Send to Noor" : "Generate audio first"}
            </button>
            <button onClick={onCancel} style={{
              display: "flex", alignItems: "center", justifyContent: "center", gap: 4,
              background: "#fce4e4", color: theme.red, border: "none", borderRadius: 10,
              padding: "10px 16px", fontSize: 13, fontWeight: 600, cursor: "pointer",
              fontFamily: "'Outfit', sans-serif",
            }}>
              <XIcon /> Cancel
            </button>
          </div>
        </>
      )}
    </div>
  );
}

  useEffect(() => {

        if (saved) setElevenLabsConfig(JSON.parse(saved));
      } catch (e) {}
  }, []);

  // Save config whenever it changes
  const saveElevenLabsConfig = useCallback(async (config) => {
    setElevenLabsConfig(config);
    try {
      localStorage.setItem("elevenLabsConfig", JSON.stringify(config));
    } catch (e) {}
  }, []);

  // Request notification permission on mount
  useEffect(() => {
    if ("Notification" in window && Notification.permission === "default") {
      Notification.requestPermission();
    }
  }, []);

  // Schedule notifications at 7:30 AM and 4:30 PM
  useEffect(() => {
    function scheduleNotification(hour, minute, title, body) {
      const now = new Date();
      const target = new Date();
      target.setHours(hour, minute, 0, 0);
      if (target <= now) target.setDate(target.getDate() + 1); // next day if time passed
      const delay = target - now;

      return setTimeout(() => {
        // Only notify on weekdays
        const dayOfWeek = new Date().getDay();
        if (dayOfWeek >= 1 && dayOfWeek <= 5) {
          if ("Notification" in window && Notification.permission === "granted") {
            new Notification(title, { body, icon: "👋", tag: title });
          }
        }
        // Reschedule for next day
        scheduleNotification(hour, minute, title, body);
      }, delay);
    }

    const t1 = scheduleNotification(7, 30, "Hey! Noor — Morning 🌅", "Time to send breakfast + lunch instructions to Noor");
    const t2 = scheduleNotification(16, 30, "Hey! Noor — Evening 🌆", "Time to send dinner instructions to Noor");

    return () => { clearTimeout(t1); clearTimeout(t2); };
  }, []);

  const day = DAYS[selectedDay];
  const isToday = selectedDay === (todayIndex >= 0 && todayIndex <= 4 ? todayIndex : -1);
  const dayLabel = isToday ? "Today" : day;
  const prernaMeals = prernaBasePlan[day];

    const meals = who === "prerna" ? prernaMealsWithOverrides : mohitMealsWithOverrides;

    setFavorites(prev => {
      const newFavs = { ...prev, [key]: !prev[key] };
      // Update favMeals list
      if (newFavs[key] && mealData) {
        setFavMeals(prev => {
          if (prev.some(f => f.key === key)) return prev;
          return [...prev, { key, who, day, mealType: meal, ...mealData }];

      } else {
        setFavMeals(prev => prev.filter(f => f.key !== key));
      }
      return newFavs;
    });
  };

          const isTodayTab = i === (todayIndex >= 0 && todayIndex <= 4 ? todayIndex : -1);
          const pSkip = !prernaActive[d];
          const mSkip = !mohitActive[d];
          return (
            <button key={d} onClick={() => setSelectedDay(i)} style={{
              flex: 1, minWidth: 54, padding: "10px 4px 8px", border: "none",
              borderRadius: 12, cursor: "pointer", fontFamily: "'Outfit', sans-serif",
              background: isActive ? theme.text : theme.card,
              color: isActive ? "#fff" : theme.text,
              fontSize: 12, fontWeight: isActive ? 700 : 500,
              boxShadow: isActive ? "0 2px 10px rgba(0,0,0,0.12)" : "none",
              transition: "all 0.2s",
              position: "relative",
            }}>
              {DAY_SHORT[i]}
              {isTodayTab && (
                <div style={{ width: 4, height: 4, borderRadius: "50%", background: isActive ? "#fff" : theme.accent, margin: "3px auto 0" }} />
              )}
              {(pSkip || mSkip) && (
                <div style={{ fontSize: 9, marginTop: 2, opacity: 0.7 }}>
                  {pSkip && mSkip ? "Both out" : pSkip ? "P out" : "M out"}
                </div>
              )}
            </button>
          );
        })}
      </div>

      {/* Daily Summary */}
      <div style={{ padding: "8px 16px 4px" }}>
        <div style={{
          background: theme.card, borderRadius: 14, padding: "16px 18px",
          border: `1px solid ${theme.border}`,
        }}>
          <div style={{ fontSize: 11, color: theme.textMuted, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 10 }}>
            {activeUser === "prerna" ? "Prerna" : "Mohit"}'s Daily Intake — {dayLabel}
          </div>
          <div style={{ display: "flex", gap: 12 }}>
            <div style={{
              flex: 1, background: theme.accentLight, borderRadius: 12, padding: "12px 14px",
            }}>
              <div style={{ fontSize: 10, fontWeight: 700, color: theme.accent, textTransform: "uppercase", letterSpacing: "0.05em" }}>
                Protein
              </div>
              <div style={{ fontSize: 24, fontWeight: 800, color: theme.text, marginTop: 2, fontFamily: "'Outfit', sans-serif" }}>
                ~{dailyProtein}g
              </div>
              <div style={{ fontSize: 10, color: theme.textMuted, marginTop: 2 }}>
                target {proteinTarget}
              </div>
            </div>
            <div style={{
              flex: 1, background: "#e8faf7", borderRadius: 12, padding: "12px 14px",
            }}>
              <div style={{ fontSize: 10, fontWeight: 700, color: theme.teal, textTransform: "uppercase", letterSpacing: "0.05em" }}>
                Calories
              </div>
              <div style={{ fontSize: 24, fontWeight: 800, color: theme.text, marginTop: 2, fontFamily: "'Outfit', sans-serif" }}>
                ~{dailyCal}
              </div>
              <div style={{ fontSize: 10, color: theme.textMuted, marginTop: 2 }}>
                kcal total
              </div>
            </div>
          </div>
        </div>
      </div>

      {/* Skip / Unskip Controls */}
      <div style={{ padding: "8px 16px 0", display: "flex", gap: 8 }}>
        <button
          onClick={() => prernaActive[day] ? setSkipModal("prerna") : setPrernaActive(p => ({ ...p, [day]: true }))}
          style={{
            flex: 1, padding: "9px 0", border: "none",
            borderRadius: 10, background: prernaActive[day] ? "#e8f8ee" : "#fff0f0",
            color: prernaActive[day] ? "#2d9a5a" : theme.red,
            fontSize: 11, fontWeight: 600, cursor: "pointer", fontFamily: "'Outfit', sans-serif",
          }}
        >
          {prernaActive[day] ? "✓ Prerna eating" : "✗ Prerna out (undo)"}
        </button>
        <button
          onClick={() => mohitActive[day] ? setSkipModal("mohit") : setMohitActive(p => ({ ...p, [day]: true }))}
          style={{
            flex: 1, padding: "9px 0", border: "none",
            borderRadius: 10, background: mohitActive[day] ? "#e8f8ee" : "#fff0f0",
            color: mohitActive[day] ? "#2d9a5a" : theme.red,
            fontSize: 11, fontWeight: 600, cursor: "pointer", fontFamily: "'Outfit', sans-serif",
          }}
        >
          {mohitActive[day] ? "✓ Mohit eating" : "✗ Mohit out (undo)"}
        </button>
      </div>

      {/* Meal Cards */}
      <div style={{ padding: "12px 16px 0" }}>
        <h3 style={{ fontSize: 14, fontWeight: 700, color: theme.text, margin: "0 0 10px", fontFamily: "'Outfit', sans-serif" }}>
          {activeUser === "prerna" ? "Prerna" : "Mohit"}'s Meals — {dayLabel}
        </h3>
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {mealTypes.filter(type => currentMeals[type]).map(type => (
            <MealCard
              key={type}
              meal={currentMeals[type]}
              mealType={type}
              who={activeUser}
              isFav={favorites[`${activeUser}-${day}-${type}`]}
              onToggleFav={() => toggleFav(activeUser, day, type)}
              onEdit={(updated) => {
                const key = `${activeUser}-${day}-${type}`;
                setMealOverrides(prev => ({ ...prev, [key]: updated }));
              }}
            />
          ))}
        </div>
      </div>

      {/* Favs Section */}
      {favMeals.length > 0 && (
        <div style={{ padding: "14px 16px 0" }}>
          <h3 style={{ fontSize: 14, fontWeight: 700, color: theme.text, margin: "0 0 10px", fontFamily: "'Outfit', sans-serif" }}>
            ❤️ Favs
          </h3>
          <div style={{ display: "flex", gap: 8, overflowX: "auto", paddingBottom: 4 }}>
            {favMeals.map((fav) => (
              <div key={fav.key} style={{
                background: theme.card, borderRadius: 10, padding: "10px 14px",
                border: `1px solid ${theme.border}`, minWidth: 140, flexShrink: 0,
              }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: theme.text, fontFamily: "'Outfit', sans-serif" }}>
                  {fav.name}
                </div>
                <div style={{ fontSize: 10, color: theme.textMuted, marginTop: 2 }}>
                  {fav.who === "prerna" ? "P" : "M"} · {fav.day} · ~{fav.protein}g
                </div>
                <button onClick={() => toggleFav(fav.who, fav.day, fav.mealType)} style={{
                  marginTop: 6, background: "none", border: "none", cursor: "pointer",
                  fontSize: 10, color: theme.red, padding: 0, fontFamily: "'Outfit', sans-serif",
                }}>
                  Remove
                </button>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Boring? Surprise Me */}
      <div style={{ padding: "14px 16px 0" }}>
        <button onClick={() => {
          if (navigator.vibrate) navigator.vibrate([20, 40, 20, 40, 30]);
          setDiceRolling(true);
          setTimeout(() => {
            setDiceRolling(false);
            setSurpriseOpen(true);
          }, 1000);
        }} disabled={diceRolling} style={{
          width: "100%", padding: "14px 0", border: "none",
          borderRadius: 14,
          background: diceRolling
            ? "linear-gradient(135deg, #ff5733, #ffc312, #5856d6, #ff2d55, #ff5733)"
            : "linear-gradient(135deg, #1c1c1e, #333)",
          backgroundSize: diceRolling ? "400% 400%" : "100% 100%",
          animation: diceRolling ? "gradientShift 0.6s ease infinite" : "none",
          color: "#fff", fontSize: 14, fontWeight: 600, cursor: diceRolling ? "wait" : "pointer",
          fontFamily: "'Outfit', sans-serif",
          display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
          transition: "all 0.3s",
          letterSpacing: "0.02em",
        }}>
          <span style={{
            display: "inline-block", fontSize: 18,
            animation: diceRolling ? "sparkle 0.3s ease infinite" : "none",
          }}>✨</span>
          {diceRolling ? "Finding something exciting..." : "Boring? Surprise Me"}
        </button>

        {/* Selected surprise meal */}
        {surpriseSelection && (
          <div style={{
            background: theme.card, borderRadius: 12, padding: "14px 16px", marginTop: 10,
            border: `1.5px solid ${theme.accent}`,
          }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
              <div>
                <div style={{ fontSize: 10, fontWeight: 700, color: theme.accent, textTransform: "uppercase", letterSpacing: "0.05em" }}>
                  Surprise Pick
                </div>
                <div style={{ fontSize: 15, fontWeight: 700, color: theme.text, marginTop: 4, fontFamily: "'Outfit', sans-serif" }}>
                  {surpriseSelection.name}
                </div>
              </div>
              <button onClick={() => setSurpriseSelection(null)} style={{
                background: "none", border: "none", cursor: "pointer", color: theme.textMuted, fontSize: 16,
              }}>✕</button>
            </div>
            <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
              <button onClick={() => {
                const phone = (elevenLabsConfig && elevenLabsConfig.noorPhone) || "";
                const text = `Noor, aaj dinner mein ${surpriseSelection.name} banana hai.`;
                const encoded = encodeURIComponent(text);
                const waUrl = phone ? `https://wa.me/${phone}?text=${encoded}` : `https://wa.me/?text=${encoded}`;
                window.open(waUrl, "_blank");
                showToast("Sent to Noor!");
              }} style={{
                flex: 1, padding: "9px 0", border: "none", borderRadius: 8,
                background: theme.green, color: "#fff", fontSize: 12, fontWeight: 600,
                cursor: "pointer", fontFamily: "'Outfit', sans-serif",
                display: "flex", alignItems: "center", justifyContent: "center", gap: 4,
              }}>
                <WhatsAppIcon /> Tell Noor
              </button>
              {surpriseSelection.youtube && (
                <button onClick={() => window.open(surpriseSelection.youtube, "_blank")} style={{
                  padding: "9px 14px", border: "none", borderRadius: 8,
                  background: "#ff0000", color: "#fff", fontSize: 12, fontWeight: 600,
                  cursor: "pointer", fontFamily: "'Outfit', sans-serif",
                }}>
                  ▶ Recipe
                </button>
              )}
            </div>
          </div>
        )}
      </div>

      {/* Voice Notes */}
      <div style={{ padding: "18px 16px" }}>
        <h3 style={{ fontSize: 14, fontWeight: 700, color: theme.text, margin: "0 0 12px", fontFamily: "'Outfit', sans-serif" }}>
          🎙️ Voice Notes for Noor — {dayLabel}
        </h3>

        {(!prernaActive[day] && !mohitActive[day]) ? (
          <div style={{
            background: "#fdf5f5", borderRadius: 14, padding: 24, textAlign: "center",
            border: `1px solid #f0d0d0`,
          }}>
            <div style={{ fontSize: 32, marginBottom: 8 }}>🚫</div>
            <div style={{ fontSize: 14, fontWeight: 600, color: theme.red }}>Both are out today</div>
            <div style={{ fontSize: 12, color: theme.textMuted, marginTop: 4 }}>No voice notes needed</div>
          </div>
        ) : (
          <>
            <VoiceNotePanel
              title="Morning — Nashta + Lunch"
              time="7:30 AM"
              script={morningScript}
              status={voiceStatus[`${day}-morning`]}
              onSend={() => { setVoice(day, "morning", "sent"); showToast("Voice note sent!"); }}
              onCancel={() => { setVoice(day, "morning", "cancelled"); showToast("Morning voice note cancelled"); }}
              day={day}
              elevenLabsConfig={elevenLabsConfig}
            />
            <VoiceNotePanel
              title="Evening — Dinner"
              time="4:30 PM"
              script={eveningScript}
              status={voiceStatus[`${day}-evening`]}
              onSend={() => { setVoice(day, "evening", "sent"); showToast("Voice note sent!"); }}
              onCancel={() => { setVoice(day, "evening", "cancelled"); showToast("Evening voice note cancelled"); }}
              day={day}
              elevenLabsConfig={elevenLabsConfig}
            />
          </>
        )}
      </div>

      {/* Feedback Log */}
      {feedbackLog.length > 0 && (
        <div style={{ padding: "0 16px 20px" }}>
          <h3 style={{ fontSize: 14, fontWeight: 700, color: theme.text, margin: "0 0 10px", fontFamily: "'Outfit', sans-serif" }}>
            📝 Feedback History
          </h3>
          {feedbackLog.slice(-5).reverse().map((f, i) => (
            <div key={i} style={{
              background: theme.card, borderRadius: 10, padding: "10px 14px", marginBottom: 8,
              border: `1px solid ${theme.border}`, fontSize: 13,
            }}>
              <div style={{ fontWeight: 600, color: theme.text }}>{f.text}</div>
              <div style={{ fontSize: 11, color: theme.textMuted, marginTop: 4 }}>{f.day} · {f.date} · {f.time}</div>
            </div>
          ))}
        </div>
      )}

      {/* Bottom Spacer */}
      <div style={{ height: 40 }} />

      {/* Modals */}
      <FeedbackModal isOpen={feedbackOpen} onClose={() => setFeedbackOpen(false)} onSubmit={handleFeedback} />
      <SkipDayModal isOpen={!!skipModal} who={skipModal} onClose={() => setSkipModal(null)} onConfirm={handleSkipConfirm} />
      <SurpriseModal isOpen={surpriseOpen} onClose={() => setSurpriseOpen(false)} onSelect={(recipe) => { setSurpriseSelection(recipe); setSurpriseOpen(false); }} />
      <SettingsModal isOpen={settingsOpen} onClose={() => setSettingsOpen(false)} config={elevenLabsConfig} onSave={saveElevenLabsConfig} />
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(HeyNoor));
  </script>
</body>
</html>
